# Pages CMS — https://app.pagescms.org
# חברו את ה-repo הפרטי והתקינו את GitHub App של Pages CMS.

media:
  input: public/assets/img
  output: /assets/img
  rename: safe
  extensions: [webp, png, jpg, jpeg, svg, gif]

settings:
  commit:
    identity: user
    templates:
      create: "Create {path} (Pages CMS)"
      update: "Update {path} (Pages CMS)"
      delete: "Delete {path} (Pages CMS)"

content:
  - name: hero
    label: ראש הדף
    type: group
    items:
      - name: hero_event
        label: אירוע בראש הדף (Hero)
        type: file
        path: src/content/hero-event/event.md
        format: yaml-frontmatter
        fields:
          - name: showEvent
            label: הצג אירוע בראש הדף
            type: boolean
            default: true
            description: "כבוי = מוצג טקסט קבוע לימים רגילים (עם כפתור צור קשר)"
          - name: kicker
            label: כותרת עליונה (אדום)
            type: string
          - name: title
            label: כותרת הכנס
            type: string
          - name: body
            label: תיאור
            type: rich-text
          - name: location
            label: מיקום
            type: string
          - name: dayLabel
            label: יום / שעה
            type: string
          - name: dateLabel
            label: תאריך
            type: string
          - name: showDiscount
            label: הצג הנחה מוקדמת
            type: boolean
            default: true
          - name: discountDeadline
            label: טקסט מועד הנחה
            type: string
          - name: discountText
            label: טקסט ההנחה
            type: string
          - name: countdownLabel
            label: כותרת ספירה לאחור
            type: string
            default: "הכנס בעוד:"
          - name: countdownTarget
            label: תאריך ושעת הכנס
            type: date
            options:
              time: true
              format: "yyyy-MM-dd'T'HH:mm:ss"
          - name: countdownEndedMessage
            label: הודעה כשהספירה נגמרת
            type: string
          - name: ctaText
            label: טקסט כפתור
            type: string
          - name: ctaHref
            label: קישור כפתור
            type: string
          - name: ctaNewTab
            label: פתיחה בטאב חדש
            type: boolean
            default: true
          - name: ctaGaEvent
            label: אירוע Analytics (אופציונלי)
            type: string
          - name: ctaGaPlacement
            label: מיקום Analytics (אופציונלי)
            type: string

      - name: hero_popup
        label: חלון קופץ (Popup)
        type: file
        path: src/content/hero-popup/popup.md
        format: yaml-frontmatter
        fields:
          - name: showPopup
            label: הצג חלון קופץ
            type: boolean
            default: true
          - name: badge
            label: תג עליון (ורוד)
            type: string
          - name: title
            label: כותרת
            type: string
          - name: body
            label: תיאור
            type: rich-text
          - name: imageUrl
            label: תמונת איור (אופציונלי)
            type: image
            description: "ריק = איור ברירת מחדל"
          - name: imageAlt
            label: טקסט חלופי לתמונה
            type: string
          - name: footnote
            label: טקסט מתחת לאיור
            type: string
          - name: ctaText
            label: טקסט כפתור
            type: string
          - name: ctaHref
            label: קישור כפתור
            type: string
          - name: ctaNewTab
            label: פתיחה בטאב חדש
            type: boolean
            default: true
          - name: ctaGaEvent
            label: אירוע Analytics (אופציונלי)
            type: string
          - name: ctaGaPlacement
            label: מיקום Analytics (אופציונלי)
            type: string

  - name: services
    label: שירותים
    type: collection
    path: src/content/services
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        label: כותרת
        type: string
      - name: iconUrl
        label: אייקון
        type: image
      - name: iconAlt
        label: טקסט חלופי לאייקון
        type: string
      - name: iconClass
        label: מחלקת CSS לאייקון (אופציונלי)
        type: string
      - name: iconWidth
        label: רוחב אייקון (px)
        type: number
        default: 72
        options:
          min: 1
      - name: iconHeight
        label: גובה אייקון (px)
        type: number
        default: 72
        options:
          min: 1
      - name: order
        label: סדר תצוגה
        type: number
        default: 0
        description: "מספר קטן יותר = מופיע קודם"
      - name: animateDelay
        label: עיכוב אנימציה (אופציונלי)
        type: string
      - name: body
        label: תיאור
        type: rich-text

  - name: products
    label: מוצרים
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: kicker
        label: תווית עליונה
        type: string
      - name: title
        label: כותרת
        type: string
      - name: imageUrl
        label: תמונה
        type: image
      - name: order
        label: סדר תצוגה
        type: number
        default: 0
      - name: animateDelay
        label: עיכוב אנימציה (אופציונלי)
        type: string
      - name: ctaText
        label: טקסט כפתור
        type: string
      - name: ctaHref
        label: קישור כפתור
        type: string
      - name: ctaNewTab
        label: פתיחה בטאב חדש
        type: boolean
        default: false
      - name: ctaGaEvent
        label: אירוע Analytics (אופציונלי)
        type: string
      - name: ctaGaPlacement
        label: מיקום Analytics (אופציונלי)
        type: string
      - name: body
        label: תיאור
        type: rich-text

  - name: events
    label: אירועים
    type: collection
    path: src/content/events
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        label: כותרת
        type: string
      - name: dateLabel
        label: תאריך / מיקום (שורה עליונה)
        type: string
      - name: imageUrl
        label: תמונה
        type: image
      - name: imageAlt
        label: טקסט חלופי לתמונה
        type: string
      - name: imageWidth
        label: רוחב תמונה (px)
        type: number
        default: 640
      - name: imageHeight
        label: גובה תמונה (px)
        type: number
        default: 360
      - name: order
        label: סדר תצוגה
        type: number
        default: 0
      - name: animateDelay
        label: עיכוב אנימציה (אופציונלי)
        type: string
      - name: ctaText
        label: טקסט כפתור
        type: string
      - name: ctaHref
        label: קישור כפתור
        type: string
      - name: ctaNewTab
        label: פתיחה בטאב חדש
        type: boolean
        default: true
      - name: ctaGaEvent
        label: אירוע Analytics (אופציונלי)
        type: string
      - name: ctaGaPlacement
        label: מיקום Analytics (אופציונלי)
        type: string
        default: events_grid
      - name: ctaGaEventId
        label: מזהה אירוע Analytics (אופציונלי)
        type: string
      - name: body
        label: תיאור
        type: rich-text

  - name: reviews
    label: המלצות
    type: collection
    path: src/content/reviews
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: name
      sort: order
      order: asc
    fields:
      - name: name
        label: שם
        type: string
      - name: date
        label: תאריך (אופציונלי)
        type: string
        default: ""
      - name: rating
        label: דירוג (1–5)
        type: number
        default: 5
        options:
          min: 1
          max: 5
      - name: photoUrl
        label: תמונת פרופיל
        type: image
        description: "ריק = ראשי תיבות"
      - name: order
        label: סדר תצוגה
        type: number
        default: 0
      - name: body
        label: טקסט ההמלצה
        type: rich-text

  - name: customer_videos
    label: לקוחות מספרים
    type: collection
    path: src/content/customer-videos
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: name
      sort: order
      order: asc
    fields:
      - name: name
        label: שם
        type: string
      - name: imageUrl
        label: תמונת כיסוי
        type: image
      - name: imageAlt
        label: טקסט חלופי לתמונה
        type: string
      - name: youtubeUrl
        label: קישור לסרטון YouTube
        type: string
      - name: order
        label: סדר תצוגה
        type: number
        default: 0

  - name: podcast
    label: פודקאסט
    type: collection
    path: src/content/podcast
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{hour}-{minute}-{second}.md"
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        label: כותרת הפרק
        type: string
      - name: imageUrl
        label: תמונת כיסוי
        type: image
      - name: imageAlt
        label: טקסט חלופי לתמונה
        type: string
      - name: youtubeUrl
        label: קישור לסרטון YouTube
        type: string
      - name: order
        label: סדר תצוגה
        type: number
        default: 0
