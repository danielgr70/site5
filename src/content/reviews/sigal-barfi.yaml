text: >-
  אורית יקרה, תודה על כנס עוצמתי ומרגש! כמות האור והמסרים המדויקים שאת מביאה
  איתך היא לא פחות ממעוררת השראה.

  תמשיכי להפיץ את האור שלך ולספר את הסיפור המדהים שלך, את ללא ספק קרן אור עבור
  כולנו. וכמובן, הקלפים שלך  פשוט מדויקים להפליא! תודה על הכל💜
