text: >-
  כל דבר שאת יוצרת מדליק אור גם במרחב בו את נמצאת וגם בלבבות כולנו… את מציבה
  מטרות ומגשימה וממך רק אפשר ללמוד.

  שאפו על כנס מקצועי, שבהחלט העניק דיוק איך כל אחד יכול להצליח להדליק אור גם
  בחייו והרי הכל עניין של מחשבה חיובית שיוצרת מציאות… תודה על ההזמנה ושמחתי לקחת
  חלק בכנס עוצמתי שכזה.
