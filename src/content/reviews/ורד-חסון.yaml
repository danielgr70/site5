text: >-
  אורית אלופה בתחומה, ידה בכול והכול בה, סיפור חייה מעורר השראה והיא עוזרת לכל
  כך הרבה אנשים בדרך. כולה אור והיא מפיצה את האור לכמה שיותר אנשים. היא מקצועית,
  מובילה, מראיינת, יוצרת כנסים ומסייעת לבעלי עסקים. יש כל כך הרבה מה ללמוד ממנה.
  זכות גדולה להכיר אותה וללמוד ממנה.
