# Decap CMS — עריכת תוכן (Markdown ב-src/content/)
#
# עריכה מקומית:
#   Terminal 1: npm run dev
#   Terminal 2: npm run cms
#   Abrir: http://localhost:4321/admin/
#
# פרודקשן (GitHub): צריך OAuth App — https://decapcms.org/docs/github-backend/

local_backend: true

backend:
  name: github
  repo: danielgr70/site5
  branch: main

site_url: https://orit-grossztein.com
display_url: https://orit-grossztein.com
logo_url: /assets/img/orit-logo.webp
locale: he

media_folder: public/assets/img
public_folder: /assets/img

# Nombres de archivo seguros (a-z, 0-9, guiones) sin que Orit los vea ni los edite.
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: hero_event
    label: אירוע בראש הדף (Hero)
    files:
      - label: כנס / אירוע
        name: event
        file: src/content/hero-event/event.md
        extension: md
        format: frontmatter
        fields:
          - label: הצג אירוע בראש הדף
            name: showEvent
            widget: boolean
            default: true
            hint: "כבוי = מוצג טקסט קבוע לימים רגילים (עם כפתור צור קשר)"
          - label: כותרת עליונה (אדום)
            name: kicker
            widget: string
          - label: כותרת הכנס
            name: title
            widget: string
          - label: תיאור
            name: body
            widget: markdown
          - label: מיקום
            name: location
            widget: string
          - label: יום / שעה
            name: dayLabel
            widget: string
          - label: תאריך
            name: dateLabel
            widget: string
          - label: הצג הנחה מוקדמת
            name: showDiscount
            widget: boolean
            default: true
          - label: טקסט מועד הנחה
            name: discountDeadline
            widget: string
            required: false
          - label: טקסט ההנחה
            name: discountText
            widget: string
            required: false
          - label: כותרת ספירה לאחור
            name: countdownLabel
            widget: string
            default: "הכנס בעוד:"
          - label: תאריך ושעת הכנס
            name: countdownTarget
            widget: datetime
            format: "YYYY-MM-DDTHH:mm"
            date_format: "DD/MM/YYYY"
            time_format: "HH:mm"
          - label: הודעה כשהספירה נגמרת
            name: countdownEndedMessage
            widget: string
          - label: טקסט כפתור
            name: ctaText
            widget: string
          - label: קישור כפתור
            name: ctaHref
            widget: string
          - label: פתיחה בטאב חדש
            name: ctaNewTab
            widget: boolean
            default: true
          - label: אירוע Analytics (אופציונלי)
            name: ctaGaEvent
            widget: string
            required: false
          - label: מיקום Analytics (אופציונלי)
            name: ctaGaPlacement
            widget: string
            required: false

  - name: hero_popup
    label: חלון קופץ (Popup)
    files:
      - label: הצעה / אירוע
        name: popup
        file: src/content/hero-popup/popup.md
        extension: md
        format: frontmatter
        fields:
          - label: הצג חלון קופץ
            name: showPopup
            widget: boolean
            default: true
          - label: תג עליון (ורוד)
            name: badge
            widget: string
            hint: "לדוגמה: הטבה לזמן מוגבל"
          - label: כותרת
            name: title
            widget: string
          - label: תיאור
            name: body
            widget: markdown
          - label: תמונת איור (אופציונלי)
            name: imageUrl
            widget: image
            required: false
            choose_url: true
            hint: "ריק = איור ברירת מחדל"
          - label: טקסט חלופי לתמונה
            name: imageAlt
            widget: string
            required: false
          - label: טקסט מתחת לאיור
            name: footnote
            widget: string
            required: false
            hint: "לדוגמה: מספר המקומות מוגבל — שמרו מקום בזמן"
          - label: טקסט כפתור
            name: ctaText
            widget: string
          - label: קישור כפתור
            name: ctaHref
            widget: string
          - label: פתיחה בטאב חדש
            name: ctaNewTab
            widget: boolean
            default: true
          - label: אירוע Analytics (אופציונלי)
            name: ctaGaEvent
            widget: string
            required: false
          - label: מיקום Analytics (אופציונלי)
            name: ctaGaPlacement
            widget: string
            required: false

  - name: services
    label: שירותים
    label_singular: שירות
    folder: src/content/services
    create: true
    delete: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - label: כותרת
        name: title
        widget: string
      - label: אייקון
        name: iconUrl
        widget: image
        choose_url: true
      - label: טקסט חלופי לאייקון
        name: iconAlt
        widget: string
      - label: מחלקת CSS לאייקון (אופציונלי)
        name: iconClass
        widget: string
        required: false
        hint: "לדוגמה: service-icon-digital או mt-3"
      - label: רוחב אייקון (px)
        name: iconWidth
        widget: number
        value_type: int
        default: 72
      - label: גובה אייקון (px)
        name: iconHeight
        widget: number
        value_type: int
        default: 72
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"
      - label: עיכוב אנימציה (אופציונלי)
        name: animateDelay
        widget: string
        required: false
        hint: "לדוגמה: 0.1s — השאר ריק לכרטיס הראשון"
      - label: תיאור
        name: body
        widget: markdown

  - name: products
    label: מוצרים
    label_singular: מוצר
    folder: src/content/products
    create: true
    delete: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - label: תווית עליונה
        name: kicker
        widget: string
        hint: "לדוגמה: מארז פרימיום"
      - label: כותרת
        name: title
        widget: string
      - label: תמונה
        name: imageUrl
        widget: image
        choose_url: true
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"
      - label: עיכוב אנימציה (אופציונלי)
        name: animateDelay
        widget: string
        required: false
        hint: "לדוגמה: 0.1s"
      - label: טקסט כפתור
        name: ctaText
        widget: string
      - label: קישור כפתור
        name: ctaHref
        widget: string
        hint: "לדוגמה: https://... או #form-contact"
      - label: פתיחה בטאב חדש
        name: ctaNewTab
        widget: boolean
        default: false
      - label: אירוע Analytics (אופציונלי)
        name: ctaGaEvent
        widget: string
        required: false
      - label: מיקום Analytics (אופציונלי)
        name: ctaGaPlacement
        widget: string
        required: false
        hint: "לדוגמה: products_grid"
      - label: תיאור
        name: body
        widget: markdown

  - name: events
    label: אירועים
    label_singular: אירוע
    folder: src/content/events
    create: true
    delete: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: [order, title, dateLabel]
    fields:
      - label: כותרת
        name: title
        widget: string
      - label: תאריך / מיקום (שורה עליונה)
        name: dateLabel
        widget: string
        hint: "לדוגמה: ירושלים | יום שלישי בערב | 7.7.26"
      - label: תמונה
        name: imageUrl
        widget: image
        choose_url: true
      - label: טקסט חלופי לתמונה
        name: imageAlt
        widget: string
      - label: רוחב תמונה (px)
        name: imageWidth
        widget: number
        value_type: int
        default: 640
      - label: גובה תמונה (px)
        name: imageHeight
        widget: number
        value_type: int
        default: 360
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"
      - label: עיכוב אנימציה (אופציונלי)
        name: animateDelay
        widget: string
        required: false
      - label: טקסט כפתור
        name: ctaText
        widget: string
      - label: קישור כפתור
        name: ctaHref
        widget: string
      - label: פתיחה בטאב חדש
        name: ctaNewTab
        widget: boolean
        default: true
      - label: אירוע Analytics (אופציונלי)
        name: ctaGaEvent
        widget: string
        required: false
      - label: מיקום Analytics (אופציונלי)
        name: ctaGaPlacement
        widget: string
        required: false
        default: events_grid
      - label: מזהה אירוע Analytics (אופציונלי)
        name: ctaGaEventId
        widget: string
        required: false
        hint: "לדוגמה: 86594 — רק אם נדרש ב-event_registration_click"
      - label: תיאור
        name: body
        widget: markdown

  - name: reviews
    label: המלצות
    label_singular: המלצה
    folder: src/content/reviews
    create: true
    delete: true
    # יצירה חדשה: שם קובץ אוטומטי (תאריך+שעה). עריכה: הקובץ הקיים נשאר ללא שינוי.
    identifier_field: name
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{name}} — {{rating}} כוכבים"
    sortable_fields: [order, name, rating]
    fields:
      - label: שם
        name: name
        widget: string
      - label: תאריך (אופציונלי)
        name: date
        widget: string
        required: false
        hint: "השאר ריק אם אין תאריך"
      - label: דירוג (1–5)
        name: rating
        widget: number
        min: 1
        max: 5
        default: 5
        value_type: int
      - label: תמונת פרופיל
        name: photoUrl
        widget: image
        required: false
        choose_url: true
        hint: "העלאה מהמחשב / בחירה מהספרייה, או «הוסף מקישור» (גוגל). ריק = ראשי תיבות"
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"
      - label: טקסט ההמלצה
        name: body
        widget: markdown

  - name: customer_videos
    label: לקוחות מספרים
    label_singular: סרטון לקוח
    folder: src/content/customer-videos
    create: true
    delete: true
    identifier_field: name
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{name}}"
    sortable_fields: [order, name]
    fields:
      - label: שם
        name: name
        widget: string
      - label: תמונת כיסוי
        name: imageUrl
        widget: image
        choose_url: true
      - label: טקסט חלופי לתמונה
        name: imageAlt
        widget: string
      - label: קישור לסרטון YouTube
        name: youtubeUrl
        widget: string
        hint: "לדוגמה: https://www.youtube.com/watch?v=..."
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"

  - name: podcast
    label: פודקאסט
    label_singular: פרק
    folder: src/content/podcast
    create: true
    delete: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}-{{second}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields:
      - label: כותרת הפרק
        name: title
        widget: string
      - label: תמונת כיסוי
        name: imageUrl
        widget: image
        choose_url: true
      - label: טקסט חלופי לתמונה
        name: imageAlt
        widget: string
      - label: קישור לסרטון YouTube
        name: youtubeUrl
        widget: string
        hint: "לדוגמה: https://www.youtube.com/watch?v=..."
      - label: סדר תצוגה
        name: order
        widget: number
        default: 0
        value_type: int
        hint: "מספר קטן יותר = מופיע קודם"
